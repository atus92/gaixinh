<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KHO ẢNH GÁI XINH - ĐẠI CA</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #000; }
        .gallery-item { break-inside: avoid; margin-bottom: 1rem; }
        .loading-spin { animation: spin 1s linear infinite; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    </style>
</head>
<body class="text-white font-sans">

    <div class="max-w-5xl mx-auto py-10 px-4">
        <div class="text-center mb-12">
            <h1 class="text-5xl font-black text-transparent bg-clip-text bg-gradient-to-r from-pink-500 to-orange-400 mb-2">
                GIRL XINH GALLERY
            </h1>
            <p class="text-zinc-500 uppercase tracking-widest text-sm italic">Hệ thống lưu trữ vĩnh viễn của Đại Ca</p>
        </div>
        
        <div class="bg-zinc-900 p-6 rounded-3xl border border-zinc-800 shadow-2xl max-w-2xl mx-auto mb-16">
            <div class="flex flex-col sm:flex-row gap-4">
                <input type="file" id="fileInput" accept="image/*" 
                    class="block w-full text-sm text-zinc-400 file:mr-4 file:py-3 file:px-6 file:rounded-2xl file:border-0 file:text-sm file:font-bold file:bg-zinc-800 file:text-white hover:file:bg-zinc-700 cursor-pointer transition-all">
                
                <button onclick="uploadToImgBB()" id="btnUpload" 
                    class="bg-pink-600 hover:bg-pink-500 text-white font-bold py-3 px-8 rounded-2xl shadow-lg transition-all duration-300 whitespace-nowrap">
                    ÚP LÊN NGAY
                </button>
            </div>
            <p id="status" class="text-center mt-4 text-sm text-zinc-500"></p>
        </div>

        <div id="gallery" class="columns-2 md:columns-3 lg:columns-4 gap-4">
            </div>
    </div>

    <script>
        const imgbbKey = '5c6293d7992c36bd139163d0555e5f27';
        const scriptURL = 'https://script.google.com/macros/s/AKfycbwZt0VXHF-J9Njl3f5OzU11L01iy3bhlfTIuH2jHSd49Yewk5480CxtmskvCpM5wYlk/exec';

        // 1. Hàm tự động lấy ảnh từ Google Sheets khi vừa mở web
        async function loadPhotos() {
            const gallery = document.getElementById('gallery');
            gallery.innerHTML = '<p class="text-center col-span-full">Đang lôi ảnh từ kho ra cho đại ca...</p>';
            try {
                const response = await fetch(scriptURL);
                const photos = await response.json();
                gallery.innerHTML = '';
                photos.reverse().forEach(url => {
                    renderPhoto(url);
                });
            } catch (e) {
                gallery.innerHTML = '<p class="text-center col-span-full text-red-500">Lỗi không lấy được ảnh đại ca ơi!</p>';
            }
        }

        // 2. Hàm hiển thị ảnh lên màn hình
        function renderPhoto(url) {
            const gallery = document.getElementById('gallery');
            const html = `
                <div class="gallery-item group relative overflow-hidden rounded-2xl border border-zinc-800 shadow-lg bg-zinc-900">
                    <img src="${url}" class="w-full h-auto object-cover group-hover:scale-105 transition duration-700" loading="lazy">
                </div>`;
            gallery.insertAdjacentHTML('beforeend', html);
        }

        // 3. Hàm xử lý Úp ảnh
        async function uploadToImgBB() {
            const fileInput = document.getElementById('fileInput');
            const btn = document.getElementById('btnUpload');
            const status = document.getElementById('status');
            const file = fileInput.files[0];
            
            if (!file) return alert("Đại ca chọn hình đã!");

            btn.innerText = "ĐANG ÚP...";
            btn.disabled = true;
            status.innerText = "Bước 1: Đang đưa ảnh lên mây...";

            const formData = new FormData();
            formData.append('image', file);

            try {
                // Úp lên ImgBB lấy link
                const res = await fetch(`https://api.imgbb.com/1/upload?key=${imgbbKey}`, { method: 'POST', body: formData });
                const data = await res.json();

                if (data.success) {
                    const imgUrl = data.data.url;
                    status.innerText = "Bước 2: Đang ghi vào sổ tay Google Sheets...";
                    
                    // Ghi link vào Google Sheets của đại ca
                    await fetch(`${scriptURL}?url=${encodeURIComponent(imgUrl)}`, { method: 'POST' });
                    
                    renderPhoto(imgUrl); // Hiện ngay lên web
                    status.innerText = "Xong! Ảnh đã được lưu vĩnh viễn.";
                    fileInput.value = '';
                }
            } catch (error) {
                alert("Lỗi rồi đại ca!");
            } finally {
                btn.innerText = "ÚP LÊN NGAY";
                btn.disabled = false;
            }
        }

        // Chạy hàm load ảnh khi mở trang
        loadPhotos();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KHO ẢNH GÁI XINH - ĐẠI CA</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-black text-white font-sans">
    <div class="max-w-5xl mx-auto py-10 px-4">
        <div class="text-center mb-12">
            <h1 class="text-5xl font-black text-transparent bg-clip-text bg-gradient-to-r from-pink-500 to-orange-400 mb-2">GIRL XINH GALLERY</h1>
            <p class="text-zinc-500 uppercase tracking-widest text-sm italic">Hệ thống của Đại Ca - Đã thông nòng</p>
        </div>
        
        <div class="bg-zinc-900 p-6 rounded-3xl border border-zinc-800 shadow-2xl max-w-2xl mx-auto mb-16">
            <div class="flex flex-col sm:flex-row gap-4">
                <input type="file" id="fileInput" accept="image/*" class="block w-full text-sm text-zinc-400 file:mr-4 file:py-3 file:px-6 file:rounded-2xl file:border-0 file:text-sm file:font-bold file:bg-zinc-800 file:text-white hover:file:bg-zinc-700 cursor-pointer">
                <button onclick="uploadToImgBB()" id="btnUpload" class="bg-pink-600 hover:bg-pink-500 text-white font-bold py-3 px-8 rounded-2xl transition-all">ÚP LÊN NGAY</button>
            </div>
            <p id="status" class="text-center mt-4 text-sm text-zinc-500"></p>
        </div>

        <div id="gallery" class="columns-2 md:columns-3 lg:columns-4 gap-4"></div>
    </div>

    <script>
        const IMGBB_KEY = '5c6293d7992c36bd139163d0555e5f27';
        const MASTER_KEY = '$2a$10$KX2DLBxa8lkYp4qGefQlseYJtfmpgawDi1FkCe7J5WEvZn4AcGwUC';
        const BIN_ID = '66289297ad19ca34f85e45c7'; 

        async function loadPhotos() {
            try {
                const res = await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}/latest`, {
                    headers: { 'X-Master-Key': MASTER_KEY }
                });
                const data = await res.json();
                if (data.record && Array.isArray(data.record)) {
                    document.getElementById('gallery').innerHTML = '';
                    data.record.reverse().forEach(url => renderPhoto(url));
                }
            } catch (e) { console.log("Lỗi load ảnh"); }
        }

        function renderPhoto(url) {
            const html = `<div class="mb-4 break-inside-avoid rounded-2xl overflow-hidden border border-zinc-800 shadow-lg bg-zinc-900">
                <img src="${url}" class="w-full h-auto object-cover hover:scale-105 transition duration-500" loading="lazy">
            </div>`;
            document.getElementById('gallery').insertAdjacentHTML('beforeend', html);
        }

        async function uploadToImgBB() {
            const file = document.getElementById('fileInput').files[0];
            if (!file) return alert("Đại ca chọn hình đã!");

            const btn = document.getElementById('btnUpload');
            const status = document.getElementById('status');
            btn.innerText = "ĐANG ÚP...";
            btn.disabled = true;
            status.innerText = "Đang xử lý, đại ca đợi tí...";

            try {
                const formData = new FormData();
                formData.append('image', file);
                const resImg = await fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_KEY}`, { method: 'POST', body: formData });
                const dataImg = await resImg.json();
                const newUrl = dataImg.data.url;

                const resGet = await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}/latest`, { headers: { 'X-Master-Key': MASTER_KEY } });
                const oldData = await resGet.json();
                let newList = Array.isArray(oldData.record) ? oldData.record : [];
                newList.push(newUrl);

                await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json', 'X-Master-Key': MASTER_KEY },
                    body: JSON.stringify(newList)
                });

                status.innerText = "Xong rồi đại ca!";
                document.getElementById('fileInput').value = '';
                loadPhotos(); 
            } catch (e) { 
                alert("Lỗi rồi đại ca!"); 
            } finally {
                btn.innerText = "ÚP LÊN NGAY";
                btn.disabled = false;
            }
        }

        loadPhotos();
    </script>
</body>
</html>

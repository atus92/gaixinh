<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KHO ẢNH GÁI XINH - ĐẠI CA</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #000; }
        .gallery-item { break-inside: avoid; margin-bottom: 1rem; }
        /* Hiệu ứng loading cho nút */
        .loading { cursor: not-allowed; opacity: 0.7; }
    </style>
</head>
<body class="text-white font-sans">

    <div class="max-w-5xl mx-auto py-10 px-4">
        <div class="text-center mb-12">
            <h1 class="text-5xl font-black text-transparent bg-clip-text bg-gradient-to-r from-pink-500 to-orange-400 mb-2">
                GIRL XINH GALLERY
            </h1>
            <p class="text-zinc-500 uppercase tracking-widest text-sm">Sân chơi của Đại Ca</p>
        </div>
        
        <div class="bg-zinc-900 p-6 rounded-3xl border border-zinc-800 shadow-2xl max-w-2xl mx-auto mb-16">
            <div class="flex flex-col sm:flex-row gap-4">
                <input type="file" id="fileInput" accept="image/*" 
                    class="block w-full text-sm text-zinc-400 
                    file:mr-4 file:py-3 file:px-6 
                    file:rounded-2xl file:border-0 
                    file:text-sm file:font-bold 
                    file:bg-zinc-800 file:text-white 
                    hover:file:bg-zinc-700 cursor-pointer transition-all">
                
                <button onclick="uploadToImgBB()" id="btnUpload" 
                    class="bg-pink-600 hover:bg-pink-500 text-white font-bold py-3 px-8 rounded-2xl shadow-lg shadow-pink-900/20 transition-all duration-300 whitespace-nowrap">
                    ÚP LÊN NGAY
                </button>
            </div>
            <p id="status" class="text-center mt-4 text-sm text-zinc-500"></p>
        </div>

        <div id="gallery" class="columns-2 md:columns-3 lg:columns-4 gap-4">
            </div>
    </div>

    <script>
        // Mã API của đại ca
        const apiKey = '5c6293d7992c36bd139163d0555e5f27'; 

        async function uploadToImgBB() {
            const fileInput = document.getElementById('fileInput');
            const btn = document.getElementById('btnUpload');
            const status = document.getElementById('status');
            const file = fileInput.files[0];
            
            if (!file) {
                alert("Đại ca chọn hình trước đã nhé!");
                return;
            }

            // Trạng thái đang xử lý
            btn.innerText = "ĐANG ĐẨY LÊN...";
            btn.classList.add('loading');
            btn.disabled = true;
            status.innerText = "Đang đưa ảnh lên kho của đại ca...";

            const formData = new FormData();
            formData.append('image', file);

            try {
                const response = await fetch(`https://api.imgbb.com/1/upload?key=${apiKey}`, {
                    method: 'POST',
                    body: formData
                });
                
                const data = await response.json();

                if (data.success) {
                    const imgUrl = data.data.url;
                    const gallery = document.getElementById('gallery');
                    
                    // Thêm ảnh vào giao diện
                    const html = `
                        <div class="gallery-item group relative overflow-hidden rounded-2xl border border-zinc-800 shadow-lg">
                            <img src="${imgUrl}" class="w-full h-auto object-cover group-hover:scale-105 transition duration-700">
                            <div class="absolute inset-0 bg-gradient-to-t from-black/60 to-transparent opacity-0 group-hover:opacity-100 transition-opacity flex items-end p-4">
                                <span class="text-xs text-white/80 font-medium italic">Vừa mới cập nhật</span>
                            </div>
                        </div>`;
                    
                    gallery.insertAdjacentHTML('afterbegin', html);
                    status.innerText = "Xong! Ảnh đã lên sóng.";
                    fileInput.value = ''; 
                } else {
                    alert("Lỗi: " + data.error.message);
                }
            } catch (error) {
                alert("Lỗi kết nối rồi đại ca ơi!");
            } finally {
                btn.innerText = "ÚP LÊN NGAY";
                btn.classList.remove('loading');
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
